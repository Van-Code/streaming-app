name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Add REACT_APP_TMDB_TOKEN as a repository secret in
          # Settings → Secrets and variables → Actions.
          REACT_APP_TMDB_TOKEN: ${{ secrets.REACT_APP_TMDB_TOKEN }}
          INLINE_RUNTIME_CHUNK: false

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true
