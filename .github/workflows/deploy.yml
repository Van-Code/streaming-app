name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required permissions for the native GitHub Pages deployment API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; a new push cancels in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Add REACT_APP_TMDB_TOKEN as a repository secret in
          # Settings → Secrets and variables → Actions.
          REACT_APP_TMDB_TOKEN: ${{ secrets.REACT_APP_TMDB_TOKEN }}
          # Moves the CRA runtime chunk from an inline <script> to an
          # external file, satisfying GitHub Pages' Content-Security-Policy.
          INLINE_RUNTIME_CHUNK: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
